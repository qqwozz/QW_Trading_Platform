services:
  postgres:
    image: postgres:16-alpine
    container_name: qw_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: qw_trading
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./deploy/migrations/001_init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./deploy/migrations/003_market_data.sql:/docker-entrypoint-initdb.d/03_market_data.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: qw_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  user-service:
    build:
      context: .
      dockerfile: deploy/Dockerfile-go
      args:
        SERVICE: cmd/user-service
    container_name: qw_user_service
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: qw_trading
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      PORT: 8081
    ports:
      - "8081:8081"
    depends_on:
      postgres: { condition: service_healthy }

  account-service:
    build:
      context: .
      dockerfile: deploy/Dockerfile-go
      args:
        SERVICE: cmd/account-service
    container_name: qw_account_service
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: qw_trading
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      PORT: 8082
    ports:
      - "8082:8082"
    depends_on:
      postgres: { condition: service_healthy }

  order-service:
    build:
      context: .
      dockerfile: deploy/Dockerfile-go
      args:
        SERVICE: cmd/order-service
    container_name: qw_order_service
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: qw_trading
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      PORT: 8083
    ports:
      - "8083:8083"
    depends_on:
      postgres: { condition: service_healthy }

  portfolio-service:
    build:
      context: .
      dockerfile: deploy/Dockerfile-go
      args:
        SERVICE: cmd/portfolio-service
    container_name: qw_portfolio_service
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: qw_trading
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      PORT: 8084
    ports:
      - "8084:8084"
    depends_on:
      postgres: { condition: service_healthy }

  matching-engine:
    build:
      context: .
      dockerfile: deploy/Dockerfile-cpp
    container_name: qw_matching_engine
    ports:
      - "50051:50051"

  market-data-service:
    build:
      context: .
      dockerfile: deploy/Dockerfile-go
      args:
        SERVICE: cmd/market-data-service
    container_name: qw_market_data_service
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: qw_trading
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      PORT: 8085
    ports:
      - "8085:8085"
    depends_on:
      postgres: { condition: service_healthy }

  history-service:
    build:
      context: .
      dockerfile: deploy/Dockerfile-go
      args:
        SERVICE: cmd/history-service
    container_name: qw_history_service
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: qw_trading
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      PORT: 8086
    ports:
      - "8086:8086"
    depends_on:
      postgres: { condition: service_healthy }

  api-gateway:
    build:
      context: .
      dockerfile: deploy/Dockerfile-go
      args:
        SERVICE: cmd/api-gateway
    container_name: qw_api_gateway
    environment:
      PORT: 8080
      USER_SERVICE_URL: http://user-service:8081
      ACCOUNT_SERVICE_URL: http://account-service:8082
      ORDER_SERVICE_URL: http://order-service:8083
      PORTFOLIO_SERVICE_URL: http://portfolio-service:8084
      MARKET_SERVICE_URL: http://market-data-service:8085
      HISTORY_SERVICE_URL: http://history-service:8086
    ports:
      - "8080:8080"
    depends_on:
      - user-service
      - account-service
      - order-service
      - portfolio-service
      - market-data-service
      - history-service

  frontend:
    build:
      context: .
      dockerfile: deploy/Dockerfile-frontend
    container_name: qw_frontend
    ports:
      - "3000:80"
    depends_on:
      - api-gateway

volumes:
  pgdata:
