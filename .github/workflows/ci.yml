name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: go vet
        run: go vet ./...

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: staticcheck
        run: staticcheck ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build all services
        run: |
          go build -o /dev/null ./cmd/api-gateway
          go build -o /dev/null ./cmd/user-service
          go build -o /dev/null ./cmd/account-service
          go build -o /dev/null ./cmd/order-service
          go build -o /dev/null ./cmd/portfolio-service
          go build -o /dev/null ./cmd/market-data-service
          go build -o /dev/null ./cmd/history-service

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build Go service Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile-go
          push: false
          build-args: SERVICE=cmd/api-gateway
          tags: qw-trading/api-gateway:test
